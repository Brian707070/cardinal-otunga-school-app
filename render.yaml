services:
  - type: web
    name: cardinal-otunga-app
    env: python
    pythonVersion: 3.9
    buildCommand: >
      apt-get update &&
      apt-get install -y libjpeg-dev zlib1g-dev &&
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: gunicorn --workers 3 --worker-class sync --timeout 60 --bind 0.0.0.0:10000 school.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: USE_POSTGRES
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: cardinal-otunga-db
          property: connectionString
  
  - type: pserv
    name: cardinal-otunga-db
    env: postgres
    plan: free
    ipAllowList: []
